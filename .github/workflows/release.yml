name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && matrix.target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || 'v0.1.0' }}
          releaseName: "Finder_All ${{ github.ref_name || 'v0.1.0' }}"
          releaseBody: |
            # Finder_All - 跨平台极速文件搜索工具
            ## 特性
            - 极速文件搜索
            - 实时搜索
            - 跨平台支持
            - 模糊匹配
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send Feishu notification
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          curl -s -X POST \
            "https://open.feishu.cn/open-apis/bot/v2/hook/${{ secrets.LARK_AT_ALL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": {
                    "tag": "plain_text",
                    "content": "✅ Finder_All 构建成功"
                  },
                  "template": "green"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**版本：** '"${TAG}"'\n**仓库：** ['REPO'](https://github.com/'REPO')\n\n**支持平台：**\n- macOS (Apple Silicon M1/M2/M3)\n- macOS (Intel)\n- Linux (x64)\n- Windows (x64)\n\n**安装包类型：**\n- macOS: .dmg\n- Linux: .deb / .AppImage\n- Windows: .msi / .exe"
                    }
                  },
                  {
                    "tag": "action",
                    "actions": [
                      {
                        "tag": "button",
                        "text": {
                          "tag": "plain_text",
                          "content": "下载 Release"
                        },
                        "url": "'"${RELEASE_URL}"'",
                        "type": "primary"
                      }
                    ]
                  }
                ]
              }
            }'
