name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && matrix.target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate macOS .icns icon
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/icons
          mkdir -p icon.iconset
          sips -z 16 16 icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon.icns
          rm -rf icon.iconset
          ls -la icon.icns

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || 'v0.1.0' }}
          releaseName: "Finder_All ${{ github.ref_name || 'v0.1.0' }}"
          releaseBody: |
            # Finder_All - 跨平台极速文件搜索工具
            ## 特性
            - 极速文件搜索
            - 实时搜索
            - 跨平台支持
            - 模糊匹配
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Feishu notification
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_AT_ALL }}
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          BUILD_STATUS="${{ needs.build.result }}"

          export TAG REPO RELEASE_URL BUILD_STATUS

          python3 << 'PYEOF'
          import json
          import urllib.request
          import os

          tag = os.environ["TAG"]
          repo = os.environ["REPO"]
          release_url = os.environ["RELEASE_URL"]
          build_status = os.environ.get("BUILD_STATUS", "unknown")
          webhook_raw = os.environ.get("LARK_WEBHOOK", "")

          if webhook_raw.startswith("http"):
              webhook_url = webhook_raw
          else:
              webhook_url = "https://open.feishu.cn/open-apis/bot/v2/hook/" + webhook_raw

          print(f"Webhook URL (first 50 chars): {webhook_url[:50]}...")
          print(f"Build status: {build_status}")
          print(f"Tag: {tag}")
          print(f"Repo: {repo}")

          if build_status == "success":
              status_text = "构建成功"
              template = "green"
          else:
              status_text = "构建失败"
              template = "red"

          content = (
              f"**版本：** {tag}\n"
              f"**仓库：** [{repo}]({release_url})\n"
              f"**状态：** {status_text}\n\n"
              "**支持平台：**\n"
              "- macOS (Apple Silicon M1/M2/M3)\n"
              "- macOS (Intel)\n"
              "- Linux (x64)\n"
              "- Windows (x64)\n\n"
              "**安装包类型：**\n"
              "- macOS: .dmg / .app.tar.gz\n"
              "- Linux: .deb / .AppImage / .rpm\n"
              "- Windows: .msi / .exe"
          )

          payload = {
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {
                          "tag": "plain_text",
                          "content": f"Finder_All {status_text}"
                      },
                      "template": template
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": content
                          }
                      },
                      {
                          "tag": "action",
                          "actions": [
                              {
                                  "tag": "button",
                                  "text": {
                                      "tag": "plain_text",
                                      "content": "查看 Release"
                                  },
                                  "url": release_url,
                                  "type": "primary"
                              }
                          ]
                      }
                  ]
              }
          }

          data = json.dumps(payload).encode("utf-8")
          print(f"Payload size: {len(data)} bytes")

          req = urllib.request.Request(webhook_url, data=data, headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=10) as resp:
                  print("Status:", resp.status)
                  response_body = resp.read().decode("utf-8")
                  print("Response:", response_body)
          except urllib.error.HTTPError as e:
              print("HTTP Error:", e.code)
              print("Response:", e.read().decode("utf-8"))
              raise
          except Exception as e:
              print("Error:", str(e))
              raise
          PYEOF
